<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Math Learning</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:     #0f172a;
    --panel:  #1e293b;
    --accent: #38bdf8;
    --text:   #f1f5f9;
    --muted:  #94a3b8;
    --radius: 16px;
  }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    background: linear-gradient(90deg, #1e293b, #0f172a);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  header .logo { font-weight: 800; font-size: 1.1rem; }
  header .logo span { color: var(--accent); }
  header .badges { display: flex; gap: 10px; }
  .badge {
    padding: 5px 14px; border-radius: 20px; font-size: 0.78rem;
    font-weight: 600; display: flex; align-items: center; gap: 6px;
  }
  .badge-sim { background: rgba(56,189,248,0.15); color: var(--accent); border: 1px solid rgba(56,189,248,0.3); }
  .badge-topic { background: rgba(99,102,241,0.2); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); }
  .main { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; }
  .sim-panel {
    background: #090f1a; border-right: 1px solid rgba(255,255,255,0.06);
    display: flex; flex-direction: column;
  }
  .sim-bar {
    padding: 8px 16px; background: rgba(0,0,0,0.3);
    display: flex; align-items: center; gap: 8px;
    font-size: 0.78rem; font-weight: 600; color: var(--muted);
  }
  .sim-bar .dots { display: flex; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-r { background: #ff5f57; } .dot-y { background: #febc2e; } .dot-g { background: #28c840; }
  .status-badge { margin-left: auto; padding: 3px 10px; border-radius: 10px; font-size: 0.72rem; font-weight: 700; }
  .status-running { background: rgba(40,200,64,0.2); color: #28c840; }
  .status-idle { background: rgba(148,163,184,0.2); color: var(--muted); }
  .sim-view { flex: 1; background: #090f1a; position: relative; overflow: hidden; }
  .sim-fallback {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; color: var(--muted); font-size: 0.9rem;
  }
  .sim-fallback a { color: var(--accent); text-decoration: none; }
  .sim-info {
    padding: 6px 12px; background: rgba(0,0,0,0.4);
    display: flex; align-items: center; gap: 10px;
    font-size: 0.72rem; color: var(--muted);
  }
  .sim-info-label {
    color: var(--accent); font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; padding: 3px 10px; border-radius: 12px;
    background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.2);
  }
  .lesson-panel { display: flex; flex-direction: column; overflow: hidden; }
  .question-box {
    padding: 20px 24px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
  }
  .question-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(99,102,241,0.2); color: #a5b4fc;
    border: 1px solid rgba(99,102,241,0.3);
    padding: 3px 12px; border-radius: 20px;
    font-size: 0.75rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
  }
  .question-text { font-size: 1.3rem; font-weight: 700; line-height: 1.4; }
  .progress-wrap { display: flex; align-items: center; gap: 10px; padding: 10px 24px; flex-shrink: 0; }
  .progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
  .progress-fill-1 { background: #38bdf8; }
  .progress-fill-2 { background: #4ade80; }
  .progress-fill-3 { background: #a78bfa; }
  .progress-label { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
  .steps-scroll {
    flex: 1; overflow-y: auto; padding: 12px 20px 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .steps-scroll::-webkit-scrollbar { width: 4px; }
  .steps-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  .step-card { border-radius: var(--radius); overflow: hidden; border: 1px solid rgba(255,255,255,0.08); animation: slideIn 0.35s ease; }
  @keyframes slideIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .step-card-1 { background: rgba(30,58,95,0.6); border-color: rgba(56,189,248,0.2); }
  .step-card-2 { background: rgba(45,58,31,0.6); border-color: rgba(74,222,128,0.2); }
  .step-card-3 { background: rgba(31,58,58,0.6); border-color: rgba(167,139,250,0.2); }
  .step-header { padding: 10px 16px; display: flex; align-items: center; gap: 10px; }
  .step-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.85rem; flex-shrink: 0; }
  .step-num-1 { background: rgba(56,189,248,0.2); color: #38bdf8; }
  .step-num-2 { background: rgba(74,222,128,0.2); color: #4ade80; }
  .step-num-3 { background: rgba(167,139,250,0.2); color: #a78bfa; }
  .step-eyebrow { font-size: 0.65rem; font-weight: 800; letter-spacing: 0.8px; text-transform: uppercase; }
  .step-eyebrow-1 { color: #38bdf8; } .step-eyebrow-2 { color: #4ade80; } .step-eyebrow-3 { color: #a78bfa; }
  .step-instruction { font-size: 1rem; font-weight: 700; color: var(--text); }
  .step-body { padding: 0 16px 14px; }
  .step-expl { font-size: 0.88rem; color: var(--muted); line-height: 1.6; border-left: 3px solid rgba(255,255,255,0.1); padding-left: 12px; margin-top: 4px; }
  .step-expl strong { color: var(--text); }
  .loading-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--muted); margin: 0 2px; animation: pulse 1.4s ease-in-out infinite; }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }
  .footer-bar { padding: 10px 20px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; gap: 10px; flex-shrink: 0; }
  .btn { padding: 8px 18px; border-radius: 10px; border: none; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
  .btn-back { background: rgba(255,255,255,0.08); color: var(--muted); }
  .btn-back:hover { background: rgba(255,255,255,0.14); color: var(--text); }
  .btn-next { background: var(--accent); color: #0f172a; }
  .btn-next:hover { filter: brightness(1.1); }
  .btn-step { background: rgba(74,222,128,0.2); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
  .btn-step:hover { background: rgba(74,222,128,0.3); }
  .btn-step:disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div class="logo">Math <span>Learning</span></div>
  <div class="badges">
    <div class="badge badge-sim" id="simBadge"><span id="simDot">&#x26AB;</span> CoppeliaSim</div>
    <div class="badge badge-topic" id="topicBadge">Loading...</div>
  </div>
</header>

<div class="main">
  <div class="sim-panel">
    <div class="sim-bar">
      <div class="dots"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div></div>
      COPPELIASIM
      <span class="status-badge status-idle" id="statusBadge">IDLE</span>
    </div>
    <div class="sim-view" id="simView" style="position:relative;">
      <div id="simFallback" class="sim-fallback" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;">
        <div style="font-weight:700;color:var(--accent);">CoppeliaSim View</div>
        <div>Watch the simulation in your CoppeliaSim desktop window,</div>
        <div>or open <a href="http://localhost:23020" target="_blank">localhost:23020</a> in a new tab</div>
      </div>
      <iframe id="simFrame" src="" style="width:100%;height:100%;border:none;background:transparent;position:absolute;top:0;left:0;z-index:2;" allow="autoplay"></iframe>
    </div>
    <div class="sim-info">
      <span class="sim-info-label" id="simActionLabel">READY</span>
      <span id="simStepLabel"></span>
    </div>
  </div>

  <div class="lesson-panel">
    <div class="question-box">
      <div class="question-badge" id="qBadge">+ LOADING</div>
      <div class="question-text" id="qText">Loading question...</div>
    </div>
    <div class="progress-wrap" id="progressWrap" style="display:none">
      <div class="progress-bar"><div class="progress-fill progress-fill-1" id="p1" style="width:0%"></div></div>
      <div class="progress-bar"><div class="progress-fill progress-fill-2" id="p2" style="width:0%"></div></div>
      <div class="progress-bar"><div class="progress-fill progress-fill-3" id="p3" style="width:0%"></div></div>
      <div class="progress-label" id="pLabel">Step 0 of 3</div>
    </div>
    <div class="steps-scroll" id="stepsScroll">
      <div style="color:var(--muted);font-size:0.88rem;padding:20px 0;text-align:center">
        <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>
        <div style="margin-top:8px">Generating your lesson...</div>
      </div>
    </div>
    <div class="footer-bar">
      <a class="btn btn-back" href="/">&#8592; Topics</a>
      <button class="btn btn-step" id="btnStep">Next Step &#9654;</button>
      <button class="btn btn-next" id="btnNext" style="display:none">Next Question &#8594;</button>
    </div>
  </div>
</div>

<script>
const topic = new URLSearchParams(window.location.search).get('topic') || 'fractions';
const totalSteps = 3;
let renderedSteps = 0;
let pollingTimer = null;
let pollInProgress = false;

const elements = {
  topicBadge: document.getElementById('topicBadge'),
  questionBadge: document.getElementById('qBadge'),
  questionText: document.getElementById('qText'),
  steps: document.getElementById('stepsScroll'),
  progress: document.getElementById('progressWrap'),
  progressLabel: document.getElementById('pLabel'),
  simAction: document.getElementById('simActionLabel'),
  simStep: document.getElementById('simStepLabel'),
  simFrame: document.getElementById('simFrame'),
  statusBadge: document.getElementById('statusBadge'),
  simDot: document.getElementById('simDot'),
  nextStep: document.getElementById('btnStep'),
  nextQuestion: document.getElementById('btnNext'),
};

function titleCase(value) {
  return value.charAt(0).toUpperCase() + value.slice(1);
}

async function fetchJson(url, options = {}) {
  const response = await fetch(url, options);
  const payload = await response.json().catch(() => ({}));
  if (!response.ok) {
    throw new Error(payload.error || `Request failed with status ${response.status}`);
  }
  return payload;
}

function showLoadingState() {
  renderedSteps = 0;
  elements.questionText.textContent = 'Loading question...';
  elements.steps.innerHTML = `
    <div style="color:var(--muted);font-size:0.88rem;padding:20px 0;text-align:center">
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <div style="margin-top:8px">Generating your lesson...</div>
    </div>`;
  elements.progress.style.display = 'none';
  elements.simAction.textContent = 'GENERATING...';
  elements.simStep.textContent = '';
  elements.nextStep.style.display = 'none';
  elements.nextQuestion.style.display = 'none';
  setStatus(true, false);
}

async function loadQuestion() {
  stopPolling();
  showLoadingState();

  try {
    const data = await fetchJson(`/question?topic=${encodeURIComponent(topic)}`);
    elements.questionText.textContent = data.question;
    elements.questionBadge.textContent = `+ ${(data.topic || topic).toUpperCase()}`;
    elements.progress.style.display = 'flex';
    elements.simAction.textContent =
      `${data.obj.toUpperCase()} · ${data.action.replace(/_/g, ' ').toUpperCase()}`;
    startPolling();
  } catch (error) {
    elements.questionText.textContent = `Error: ${error.message}`;
    setStatus(false, false);
  }
}

function startPolling() {
  stopPolling();
  pollingTimer = window.setInterval(pollStep, 1000);
  pollStep();
}

function stopPolling() {
  if (pollingTimer !== null) {
    window.clearInterval(pollingTimer);
    pollingTimer = null;
  }
}

async function pollStep() {
  if (pollInProgress) return;
  pollInProgress = true;

  try {
    const data = await fetchJson('/step');
    updateLesson(data);
  } catch (error) {
    console.error('Unable to poll lesson state:', error);
  } finally {
    pollInProgress = false;
  }
}

function updateLesson(data) {
  setStatus(data.running, data.sim_connected);

  const stepIndex = data.step_index;
  for (let step = 1; step <= totalSteps; step += 1) {
    document.getElementById(`p${step}`).style.width = stepIndex >= step ? '100%' : '0%';
  }
  elements.progressLabel.textContent = `Step ${stepIndex} of ${totalSteps}`;
  elements.simStep.textContent = stepIndex > 0 ? `Step ${stepIndex} of ${totalSteps}` : '';

  if (Array.isArray(data.steps) && data.steps.length > renderedSteps) {
    if (renderedSteps === 0) elements.steps.replaceChildren();
    for (let index = renderedSteps; index < data.steps.length; index += 1) {
      renderStep(data.steps[index]);
      renderedSteps += 1;
    }
  }

  updateButtons(data);
}

function updateButtons(data) {
  const stepIndex = data.step_index;
  const stepCount = Array.isArray(data.steps) ? data.steps.length : 0;

  if (!data.running && stepIndex >= totalSteps) {
    elements.nextStep.style.display = 'none';
    elements.nextQuestion.style.display = 'inline-block';
    stopPolling();
    return;
  }

  if (stepIndex > 0 && stepIndex < totalSteps && stepCount >= stepIndex) {
    elements.nextStep.style.display = 'inline-block';
    elements.nextStep.disabled = false;
    elements.nextQuestion.style.display = 'none';
    return;
  }

  if (data.running && stepCount < stepIndex + 1) {
    elements.nextStep.style.display = 'inline-block';
    elements.nextStep.disabled = true;
    elements.nextQuestion.style.display = 'none';
    return;
  }

  elements.nextStep.style.display = 'none';
  elements.nextQuestion.style.display = 'none';
}

function renderStep(step) {
  const stepNumber = step.step_index;
  const card = document.createElement('div');
  card.className = `step-card step-card-${stepNumber}`;

  const header = document.createElement('div');
  header.className = 'step-header';

  const number = document.createElement('div');
  number.className = `step-num step-num-${stepNumber}`;
  number.textContent = String(stepNumber);

  const heading = document.createElement('div');
  const eyebrow = document.createElement('div');
  eyebrow.className = `step-eyebrow step-eyebrow-${stepNumber}`;
  eyebrow.textContent = step.title || '';

  const instruction = document.createElement('div');
  instruction.className = 'step-instruction';
  instruction.innerHTML = step.instruction || '';

  const body = document.createElement('div');
  body.className = 'step-body';
  const explanation = document.createElement('div');
  explanation.className = 'step-expl';
  explanation.innerHTML = step.explanation || '';

  heading.append(eyebrow, instruction);
  header.append(number, heading);
  body.append(explanation);
  card.append(header, body);
  elements.steps.append(card);
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function setStatus(running, simConnected) {
  if (running) {
    elements.statusBadge.className = 'status-badge status-running';
    elements.statusBadge.textContent = '● RUNNING';
    elements.simDot.textContent = '🟢';
    return;
  }

  elements.statusBadge.className = 'status-badge status-idle';
  elements.statusBadge.textContent = simConnected ? '● SIM SYNCED' : 'IDLE';
  elements.simDot.textContent = simConnected ? '🟢' : '⚫';
}

async function advanceStep() {
  elements.nextStep.disabled = true;
  try {
    await fetchJson('/advance', { method: 'POST' });
    await pollStep();
  } catch (error) {
    console.error('Unable to advance lesson:', error);
    elements.nextStep.disabled = false;
  }
}

function configureSimulatorFrame() {
  const simulatorUrl = new URLSearchParams(window.location.search).get('simUrl');
  elements.simFrame.src = simulatorUrl || 'http://localhost:23020';
  elements.simFrame.style.display = 'block';
}

elements.topicBadge.textContent = titleCase(topic);
elements.questionBadge.textContent = `+ ${topic.toUpperCase()}`;
elements.nextStep.addEventListener('click', advanceStep);
elements.nextQuestion.addEventListener('click', loadQuestion);
window.addEventListener('beforeunload', stopPolling);

configureSimulatorFrame();
loadQuestion();
</script>
</body>
</html>
